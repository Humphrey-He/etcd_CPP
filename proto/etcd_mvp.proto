syntax = "proto3";

package etcdmvp;

service KV {
  rpc Put(PutRequest) returns (PutResponse);
  rpc Get(GetRequest) returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Txn(TxnRequest) returns (TxnResponse);
}

service Watch {
  rpc Watch(WatchRequest) returns (stream WatchResponse);
}

service Lease {
  rpc LeaseGrant(LeaseGrantRequest) returns (LeaseGrantResponse);
  rpc LeaseRevoke(LeaseRevokeRequest) returns (LeaseRevokeResponse);
  rpc LeaseKeepAlive(LeaseKeepAliveRequest) returns (LeaseKeepAliveResponse);
}

service Cluster {
  rpc MemberList(Empty) returns (MemberListResponse);
  rpc Status(Empty) returns (StatusResponse);
}

service Raft {
  rpc AppendEntries(AppendEntriesRequest) returns (AppendEntriesResponse);
  rpc RequestVote(RequestVoteRequest) returns (RequestVoteResponse);
}

message Empty {}

enum ErrorCode {
  OK = 0;
  NOT_LEADER = 1;
  HISTORY_UNAVAILABLE = 2;
  INTERNAL = 3;
}

message ResponseHeader {
  ErrorCode code = 1;
  string leader_address = 2;
  string message = 3;
  string request_id = 4;
}

message KeyValue {
  bytes key = 1;
  bytes value = 2;
  int64 create_revision = 3;
  int64 mod_revision = 4;
  int64 version = 5;
  int64 lease = 6;
}

message PutRequest {
  bytes key = 1;
  bytes value = 2;
  int64 lease = 3;
  string request_id = 4;
}

message PutResponse {
  ResponseHeader header = 1;
  int64 revision = 2;
}

message GetRequest {
  bytes key = 1;
  string request_id = 2;
}

message GetResponse {
  ResponseHeader header = 1;
  int64 revision = 2;
  repeated KeyValue kvs = 3;
}

message DeleteRequest {
  bytes key = 1;
  string request_id = 2;
}

message DeleteResponse {
  ResponseHeader header = 1;
  int64 revision = 2;
  int64 deleted = 3;
}

message Compare {
  bytes key = 1;
  CompareResult result = 2;
  CompareTarget target = 3;
  bytes value = 4;
  int64 revision = 5;
}

enum CompareResult {
  EQUAL = 0;
  GREATER = 1;
  LESS = 2;
  NOT_EQUAL = 3;
}

enum CompareTarget {
  VALUE = 0;
  MOD = 1;
}

message RequestOp {
  oneof request {
    PutRequest put_request = 1;
    GetRequest get_request = 2;
    DeleteRequest delete_request = 3;
  }
}

message ResponseOp {
  oneof response {
    PutResponse put_response = 1;
    GetResponse get_response = 2;
    DeleteResponse delete_response = 3;
  }
}

message TxnRequest {
  repeated Compare compare = 1;
  repeated RequestOp success = 2;
  repeated RequestOp failure = 3;
  string request_id = 4;
}

message TxnResponse {
  ResponseHeader header = 1;
  bool succeeded = 2;
  repeated ResponseOp responses = 3;
}

message WatchRequest {
  oneof request_union {
    WatchCreateRequest create_request = 1;
    WatchCancelRequest cancel_request = 2;
  }
  string request_id = 3;
}

message WatchCreateRequest {
  bytes key = 1;
  bool prefix = 2;
  int64 start_revision = 3;
}

message WatchCancelRequest {
  int64 watch_id = 1;
}

message Event {
  enum EventType {
    PUT = 0;
    DELETE = 1;
  }
  EventType type = 1;
  KeyValue kv = 2;
}

message WatchResponse {
  ResponseHeader header = 1;
  int64 watch_id = 2;
  int64 revision = 3;
  repeated Event events = 4;
  bool canceled = 5;
  int64 compact_revision = 6;
}

message LeaseGrantRequest {
  int64 ttl = 1;
}

message LeaseGrantResponse {
  ResponseHeader header = 1;
  int64 id = 2;
  int64 ttl = 3;
}

message LeaseRevokeRequest {
  int64 id = 1;
}

message LeaseRevokeResponse {
  ResponseHeader header = 1;
}

message LeaseKeepAliveRequest {
  int64 id = 1;
}

message LeaseKeepAliveResponse {
  ResponseHeader header = 1;
  int64 id = 2;
  int64 ttl = 3;
}

message Member {
  int64 id = 1;
  string name = 2;
  repeated string peer_urls = 3;
}

message MemberListResponse {
  ResponseHeader header = 1;
  repeated Member members = 2;
}

message StatusResponse {
  ResponseHeader header = 1;
  int64 leader = 2;
  int64 revision = 3;
}

message RaftEntry {
  uint64 term = 1;
  uint64 index = 2;
  bytes data = 3;
}

message AppendEntriesRequest {
  uint64 term = 1;
  int64 leader_id = 2;
  uint64 prev_log_index = 3;
  uint64 prev_log_term = 4;
  repeated RaftEntry entries = 5;
  uint64 leader_commit = 6;
}

message AppendEntriesResponse {
  uint64 term = 1;
  bool success = 2;
  uint64 match_index = 3;
}

message RequestVoteRequest {
  uint64 term = 1;
  int64 candidate_id = 2;
  uint64 last_log_index = 3;
  uint64 last_log_term = 4;
}

message RequestVoteResponse {
  uint64 term = 1;
  bool vote_granted = 2;
}
